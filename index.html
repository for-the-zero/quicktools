<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
</head>
<body>
    <center>
        <h1>Redirecting...</h1>
        <hr />
        <script>
            var path = window.location.pathname;
            if(path.includes('/quicktools/')){
                path = path.replace('/quicktools/', '/');
            };
            const config = {
                "title": "该去新的链接了",
                "desc": "杂鱼♥~ 被我抓到了吧~\n你还在用Github Pages的域名？猫猫都放弃了呐\n这里给出三个新的短点的域名你自己访问去吧~",
                "links": [
                    {"name": "Netlify", "url": "https://t.ftz.is-a.dev"},
                    {"name": "Vercel", "url": "https://t.ftz.cc.cd"},
                    {"name": "Cloudflare Pages", "url": "https://tooys/pages.dev"}
                ],
                "tgb": false
            };
            config.links = config.links.map(l => ({ ...l, url: l.url + path }));
            const json = JSON.stringify(config);
            const target = 'https://tooys.pages.dev/builts/selinkt/?' + json;
            document.getElementById('fallback').href = target;
            window.location.href = target;
        </script>
        <a id="fallback" href="#">Click here if you are not redirected.</a>
    </center>
</body>
</html>
